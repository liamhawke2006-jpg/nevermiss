<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>Welcome aboard — Gondola Getaway × NeverMiss</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@700;800&family=Public+Sans:wght@500;600;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<style>
  :root{--ink:#0E1513;--pine:#0E7A60;--sig:#2BC48E;--paper:#FBF8F1;--muted:#6B746E}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Public Sans",sans-serif;background:#E8E4D8;color:var(--ink);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
  .sign{width:100%;max-width:1040px;aspect-ratio:11/8.5;background:var(--paper);border:14px solid var(--sig);border-radius:24px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:5% 7%;position:relative;box-shadow:0 40px 90px -30px rgba(0,0,0,.4)}
  .logo{display:flex;align-items:center;gap:12px;margin-bottom:3%}
  .logo .mk{width:46px;height:46px}
  .logo .wm{font-family:"Bricolage Grotesque";font-weight:800;font-size:clamp(20px,2.6vw,30px)}
  .logo .wm b{color:var(--sig)}
  .eyebrow{font-family:"Space Mono";font-weight:700;letter-spacing:.34em;text-transform:uppercase;color:var(--pine);font-size:clamp(13px,1.8vw,20px);margin-bottom:2.5%}
  .name{font-family:"Bricolage Grotesque";font-weight:800;letter-spacing:-.02em;line-height:.95;font-size:clamp(48px,9vw,108px);color:var(--ink)}
  .powered{font-family:"Bricolage Grotesque";font-weight:700;font-size:clamp(22px,3.4vw,42px);margin-top:2.5%;color:var(--ink)}
  .powered b{color:var(--sig)}
  .badge{margin-top:4%;display:inline-flex;align-items:center;gap:11px;background:var(--ink);color:#fff;font-weight:700;font-size:clamp(14px,1.9vw,21px);padding:13px 26px;border-radius:999px}
  .badge .ck{width:24px;height:24px;border-radius:50%;background:var(--sig);color:#06140f;display:grid;place-items:center;font-weight:800;flex:none}
  .foot{position:absolute;bottom:4%;font-family:"Space Mono";font-size:clamp(11px,1.4vw,15px);color:var(--muted);letter-spacing:.05em}
  @media print{
    @page{size:landscape;margin:0}
    body{background:#fff;padding:0;-webkit-print-color-adjust:exact;print-color-adjust:exact}
    .sign{box-shadow:none;max-width:100%;width:100vw;height:100vh;aspect-ratio:auto;border-radius:0}
  }
</style>
</head>
<body>
  <div class="sign">
    <div class="logo">
      <svg class="mk" viewBox="0 0 64 64" fill="none"><rect x="3" y="3" width="58" height="58" rx="18" fill="#0E7A60"/><g transform="translate(14.5,14.5) scale(1.46)" fill="#fff"><path d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56-.35-.12-.74-.03-1.01.24l-1.57 1.97c-2.83-1.35-5.48-3.9-6.89-6.83l1.95-1.66c.27-.28.35-.67.24-1.02-.37-1.11-.56-2.3-.56-3.53 0-.54-.45-.99-.99-.99H4.19C3.65 3 3 3.24 3 3.99 3 13.28 10.73 21 20.01 21c.71 0 .99-.63.99-1.18v-3.45c0-.54-.45-.99-.99-.99z"/></g><circle cx="46.5" cy="18" r="6" fill="#2BC48E"/></svg>
      <span class="wm">Never<b>Miss</b></span>
    </div>

    <div class="eyebrow">Welcome aboard</div>
    <!-- ↓ change this one line to reuse for any client -->
    <div class="name">Gondola Getaway</div>
    <div class="powered">is now powered by <b>NeverMiss</b></div>

    <div class="badge"><span class="ck">✓</span> 24/7 front desk · never miss a call</div>

    <div class="foot">nevermissai.net</div>
  </div>
</body>
</html>
